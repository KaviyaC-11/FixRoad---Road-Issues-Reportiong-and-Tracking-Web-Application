<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login | FixRoad</title>

    <!-- Responsive viewport -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Main stylesheet -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>
<body>

<!-- ================= Navbar ================= -->
<header class="navbar">
    <div class="logo">FixRoad</div>
    <nav>
        <a href="index.html">Home</a>
        <a href="register.html">Register</a>
    </nav>
</header>

<!-- ================= Login Section ================= -->
<section class="form-section">

    <div>
        <img  class="image2" src="images/login.jpeg" alt="">
    </div> 
    
    <div class="form-card">
        <h2>Login</h2>

        <!-- Login Form -->
        <form id="loginForm">

            <!-- Email -->
            <label>Email</label>
            <input 
                type="email" 
                id="loginEmail" 
                placeholder="Enter your email" 
                required
            >

            <!-- Password -->
            <label>Password</label>
            <div class="password-wrapper">
            <input 
                type="password" 
                id="loginPassword" 
                placeholder="Enter your password" 
                required
            >
            <button type="button" 
            class="toggle-password-btn" 
            data-target="loginPassword">
        Show
    </button>
            </div>

                 <p id="loginError" class="error-text"></p>

            <!-- Submit Button -->
            <button type="submit" class="btn-dark form-btn">
                Login
            </button>
        </form>

        <!-- Forgot password link -->
        <p class="form-footer">
            <a href="forgot-password.html">Forgot Password?</a>
        </p>

        <!-- Register redirect -->
        <p class="form-footer">
            Don’t have an account?
            <a href="register.html">Register</a>
        </p>
    </div>
</section>

<!-- Main JavaScript -->
<script src="js/script.js"></script>

</body>
</html>
