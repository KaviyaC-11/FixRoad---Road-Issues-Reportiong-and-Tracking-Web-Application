<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Forgot Password | FixRoad</title>

    <!-- Responsive viewport -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Main stylesheet -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>
<body>

<!-- ================= Navbar ================= -->
<header class="navbar">
    <div class="logo">FixRoad</div>
    <nav>
        <a href="index.html">Home</a>
        <a href="login.html">Login</a>
    </nav>
</header>

<!-- ================= Forgot Password Section ================= -->
<section class="form-section">

    <div>
        <img class="image2" src="images/forgot.jpeg" alt="">
    </div>
    
    <div class="form-card">
        <h2>Forgot Password</h2>

        <!-- Instruction text -->
        <p class="otp-text">
            Enter your email to receive an OTP.
        </p>

        <!-- Forgot Password Form -->
        <form id="forgotForm">

            <!-- Email -->
            <label>Email</label>
            <input 
                type="email"
                id="forgotEmail"
                placeholder="Enter your email"
                required
            >

            <!-- Success or status message -->
            <p id="forgotMessage" class="success-text"></p>

            <!-- Submit button -->
            <button type="submit" class="btn-dark form-btn">
                Send Reset Link
            </button>
        </form>

        <!-- Login redirect -->
        <p class="form-footer">
            Remember your password?
            <a href="login.html">Login</a>
        </p>
    </div>
</section>

<!-- Main JavaScript -->
<script src="js/script.js"></script>

</body>
</html>
