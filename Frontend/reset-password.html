<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Reset Password | FixRoad</title>

    <!-- Responsive viewport -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Main stylesheet -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>
<body>

<!-- ================= Navbar ================= -->
<header class="navbar">
    <div class="logo">FixRoad</div>
    <nav>
        <a href="index.html">Home</a>
        <a href="login.html">Login</a>
    </nav>
</header>

<!-- ================= Reset Password Section ================= -->
<section class="form-section">
    <div class="form-card">
        <h2>Reset Password</h2>

        <!-- Instruction text -->
        <p class="otp-text">
            Enter your new password below.
        </p>

        <!-- Reset Password Form -->
        <form id="resetForm">

            <!-- New Password -->
            <label>New Password</label>
            <div class="password-wrapper">
                 <input 
                    type="password"
                    id="newPassword"
                    placeholder="Enter new password"
                     required
                >
              <button type="button" 
            class="toggle-password-btn" 
            data-target="newPassword">
        Show
    </button>
            </div>

            <!-- Confirm Password -->
            <label>Confirm Password</label>
            <div class="password-wrapper">
                 <input 
                    type="password"
                    id="confirmPassword"
                    placeholder="Confirm new password"
                    required
                 >
           <button type="button" 
            class="toggle-password-btn" 
            data-target="confirmPassword">
        Show
    </button>
            </div>

            <!-- Status messages -->
            <p id="resetMessage" class="success-text"></p>
            <p id="resetError" class="error-text"></p>

            <!-- Submit button -->
            <button type="submit" class="btn-dark form-btn">
                Reset Password
            </button>
        </form>
    </div>
</section>

<!-- Main JavaScript -->
<script src="js/script.js"></script>

</body>
</html>
