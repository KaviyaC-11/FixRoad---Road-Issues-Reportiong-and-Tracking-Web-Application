<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Issues | FixRoad</title>

    <!-- Responsive viewport -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Main stylesheet -->
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/responsive.css">
</head>
<body>

<!-- ================= Top Bar ================= -->
<header class="topbar">

    <!-- LEFT -->
    <div class="top-left">
        <button id="menuToggle" class="menu-btn">☰</button>
        <div class="logo">FixRoad</div>
    </div>

    <!-- CENTER TITLE -->
    <div class="portal-title">
        Road Issue Reporting and Tracking Portal
    </div>

    <!-- RIGHT EMPTY SPACE (for balance) -->
    <div class="top-right"></div>

</header>

<!-- ================= Sidebar ================= -->
<aside id="sidebar" class="sidebar">

    <!-- Main menu -->
    <div class="sidebar-menu">
        <a href="home.html">Home</a>
        <a href="report-issue.html">Report Issue</a>
        <a href="my-issues.html">My Issues</a>
    </div>

    <!-- Logout section -->
    <div class="sidebar-logout">
       <a href="#" onclick="logout(event)">Logout</a>
    </div>
</aside>

<!-- ================= Main Content ================= -->
<!-- Main Content -->
<main id="content" class="content">

    <h2>My Reported Issues</h2>


    <!-- No Issues Message -->
    <div id="noIssuesMessage" class="no-issues-message" style="display:none;">
        No reported issues yet.
    </div>


    <!-- Issues Table -->
    <div class="table-container" id="issuesTableContainer">

        <table class="issue-table user-myissues-table">

            <thead>
                <tr>
                    <th>Issue</th>
                    <th>Place</th>
                    <th>Date</th>
                    <th>Status</th>
                    <th>Track</th>
                    
                </tr>
            </thead>

            <tbody id="issuesTableBody">
            </tbody>

        </table>

    </div>

</main>


<!-- Main JavaScript -->
<script src="/js/script.js"></script>
<script src="/js/myissues.js"></script>

</body>
</html>
